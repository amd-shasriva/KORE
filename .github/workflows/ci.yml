name: CPU tests and packaging

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  cpu-tests:
    name: CPU / ${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: top-level
            path: tests
          - name: package-local
            path: kore
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            .github/constraints-ci.txt
      - name: Install constrained CPU test environment
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install \
            --constraint .github/constraints-ci.txt \
            --extra-index-url https://download.pytorch.org/whl/cpu \
            --editable ".[test]"
          python -m pip check
      - name: Run ${{ matrix.name }} suite
        run: python -m pytest "${{ matrix.path }}"

  package-artifacts:
    name: Wheel and sdist contract
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: .github/constraints-ci.txt
      - name: Build with constrained tooling
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install \
            --constraint .github/constraints-ci.txt \
            "build==1.5.0" "setuptools==83.0.0" "wheel==0.47.0"
          python -m build --no-isolation
      - name: Validate artifacts and isolated install
        env:
          KORE_PIP_CONSTRAINT: ${{ github.workspace }}/.github/constraints-ci.txt
        run: >-
          python tests/wheel_smoke.py
          --wheel dist/kore-*.whl
          --sdist dist/kore-*.tar.gz
