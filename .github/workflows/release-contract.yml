name: Release contract

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  release-contract:
    name: Licensing and generated artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            .github/constraints-ci.txt
      - name: Install constrained release-test environment
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install \
            --constraint .github/constraints-ci.txt \
            --extra-index-url https://download.pytorch.org/whl/cpu \
            --editable ".[test]"
          python -m pip check
      - name: Enforce release-only contracts
        run: >-
          python -m pytest
          -o "addopts=-q --strict-markers --import-mode=importlib"
          -m release tests
