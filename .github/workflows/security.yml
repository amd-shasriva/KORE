name: Security contracts

on:
  pull_request:
  push:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: .github/constraints-ci.txt
      - name: Install audited runtime
        run: |
          python -m pip install "pip==26.1.2" "setuptools==83.0.0"
          python -m pip install --constraint .github/constraints-ci.txt .
          python -m pip install \
            --constraint .github/constraints-ci.txt "pip-audit==2.10.1"
          python -m pip check
      - name: Audit installed dependencies
        run: pip-audit --local --skip-editable --progress-spinner=off

  secret-scan:
    name: Git history secret scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out full history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Install checksum-pinned gitleaks
        run: |
          curl --fail --location --silent --show-error \
            --output /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  /tmp/gitleaks.tar.gz" \
            | sha256sum --check -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
      - name: Scan every revision
        run: /tmp/gitleaks git --redact --no-banner --log-opts="--all"

  codeql:
    name: CodeQL Python
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          languages: python
          queries: security-extended
      - name: Analyze
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
