task_id: flash_attn_sliding_decode_bf16
operation: flash_attn_sliding_decode
dtype: bf16
backend: triton
gpu_target: gfx950
seed_kernel_name: seed_triton.py
# bf16 sliding-window (GQA) decode (seq_q=1) vs fp32 windowed-SDPA oracle. The single
# query attends only the most recent W keys; a windowed kernel reads only the last W of
# the Skv KV cache (bounded work) and beats dense decode. Online-softmax bf16 lands
# ~40-45 dB; gate at 25 dB rejects a missing max-subtraction / wrong-rescale /
# bad-window-band kernel. STAGED DRAFT - verify on gfx950 before promotion.
snr_threshold: 25.0
shapes:
  minimal: {B: 1, H: 8, KV: 2, Skv: 1024, D: 128, W: 256}
  primary: {B: 8, H: 32, KV: 8, Skv: 8192, D: 128, W: 1024}   # Mistral-style, 1k window
  validation:
    - {B: 1, H: 32, KV: 8, Skv: 16384, D: 128, W: 4096}       # long ctx, wide window
    - {B: 64, H: 32, KV: 8, Skv: 4096, D: 128, W: 1024}       # large batch decode
    - {B: 1, H: 32, KV: 8, Skv: 8191, D: 128, W: 1000}        # non-multiple KV + window edge
targets:
  snr_db: 25.0
  comparison_baseline: aiter_flash_attn   # dense seq_q=1 decode (window kernel beats it)
