task_id: layernorm_backward_bf16
operation: layernorm_backward
dtype: bf16
backend: triton
gpu_target: gfx950
seed_kernel_name: seed_triton.py
# LayerNorm backward: (x, gamma, dy) -> (dx[M,N], dgamma[N], dbeta[N]). dx analytic
# per row; dgamma/dbeta reduce over the token axis (atomics or a two-stage
# reduction). eps = 1e-5 (PyTorch LayerNorm default). Correctness = worst SNR of
# the three gradients vs the torch AUTOGRAD oracle. Gate at 25 dB (KORE bf16 bar);
# the dgamma/dbeta token reduction is where bf16 error concentrates, so the seed
# accumulates in fp32. STAGED DRAFT - verify on gfx950 before promotion.
snr_threshold: 25.0
shapes:
  minimal: {M: 64, N: 512}
  primary: {M: 4096, N: 4096}          # training-step LayerNorm backward, Llama-3-ish hidden
  validation:
    - {M: 8192, N: 4096}               # wide batch x hidden
    - {M: 2048, N: 8192}               # long-context training row, wide hidden
    - {M: 32768, N: 4096}              # 32k-token batch (upper training range)
    - {M: 4096, N: 8191}              # non-pow2 N tail (edge, masking)
targets:
  snr_db: 25.0
  comparison_baseline: torch_autograd_backward   # framework fused LayerNorm backward (perf-only)
