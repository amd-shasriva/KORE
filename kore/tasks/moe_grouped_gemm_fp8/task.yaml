# gate_up projection (blueprint M3/M6, fp8). Unbalanced jagged token->expert
# counts with a guaranteed 0-token last expert. Oracle: fp32 of the DEQUANTIZED
# per-group matmul (the fp8 rounding is shared by candidate + reference, so the
# gate measures kernel fidelity, not quant error). Vendor: per-expert
# aiter.gemm_a8w8 (CK). gate at 25 dB (fp8 bar). fp8 = OCP e4m3fn on gfx950.
