task_id: paged_attn_decode_bf16
operation: paged_attn_decode
dtype: bf16
backend: triton
gpu_target: gfx950
seed_kernel_name: seed_triton.py
# bf16 paged-KV decode (page/block size 16) vs an fp32 paged-gather softmax
# oracle. fp32-accumulation candidate reading the same bf16 cache lands well
# above the gate; 25 dB (KORE low-precision attention bar) rejects wrong
# page-gather / online-softmax kernels. Validation includes a partial last page.
snr_threshold: 25.0
shapes:
  minimal: {B: 1, H: 8, KV: 2, Skv: 256, D: 128}
  primary: {B: 8, H: 32, KV: 8, Skv: 4096, D: 128}    # Llama-3.1-8B GQA paged decode
  validation:
    - {B: 1, H: 32, KV: 8, Skv: 8192, D: 128}          # long KV
    - {B: 16, H: 32, KV: 8, Skv: 1024, D: 128}         # larger batch
    - {B: 4, H: 32, KV: 8, Skv: 1000, D: 128}          # partial last page edge (1000 % 16 != 0)
targets:
  snr_db: 25.0
  comparison_baseline: aiter_paged_attention_rocm   # AITER ROCm custom paged attention
